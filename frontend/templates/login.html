<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecOp System | Login</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --primary: #00f2ff;
            --secondary: #7000ff;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000000 100%);
        }

        /* Animated Background Mesh */
        .background-fx {
            position: absolute;
            width: 200vw;
            height: 200vh;
            background:
                linear-gradient(transparent 95%, rgba(0, 242, 255, 0.1) 95%),
                linear-gradient(90deg, transparent 95%, rgba(112, 0, 255, 0.1) 95%);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
            z-index: -1;
        }

        @keyframes gridMove {
            0% {
                transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px);
            }

            100% {
                transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px);
            }
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
        }

        h1 {
            color: var(--text);
            margin-bottom: 2rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        input {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            padding-right: 2.5rem;
            /* Make room for the eye icon */
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        .error-msg {
            color: #ff4d4d;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>

<body>
    <div class="background-fx"></div>
    <div class="login-card">
        <h1 id="title">System Access</h1>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Key" required>
                <i class="fas fa-eye password-toggle" onclick="togglePassword('password', this)"
                    title="Show Password"></i>
            </div>
            <button type="submit">Authenticate</button>
            <div style="margin-top:1rem; font-size:0.9rem; color:#aaa;">
                New user? <a href="#" onclick="toggleMode('register')"
                    style="color:var(--primary); text-decoration:none;">Create Account</a>
            </div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" style="display:none;">
            <div class="input-group">
                <input type="text" id="reg-username" placeholder="New Username" required>
            </div>
            <div class="input-group">
                <input type="email" id="reg-email" placeholder="Corporate Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="reg-password" placeholder="Set Password" required>
                <i class="fas fa-eye password-toggle" onclick="togglePassword('reg-password', this)"
                    title="Show Password"></i>
            </div>
            <button type="submit">Send Verification</button>
            <div style="margin-top:1rem; font-size:0.9rem; color:#aaa;">
                <a href="#" onclick="toggleMode('login')" style="color:var(--primary); text-decoration:none;">Back to
                    Login</a>
            </div>
        </form>

        <!-- Verify Form -->
        <form id="verifyForm" style="display:none;">
            <div class="input-group">
                <input type="text" id="verify-code" placeholder="Verification Code" required>
            </div>
            <button type="submit">Verify Account</button>
            <div style="margin-top:1rem; font-size:0.9rem; color:#aaa;">
                <a href="#" onclick="toggleMode('register')" style="color:var(--primary); text-decoration:none;">Resend
                    Code</a>
            </div>
        </form>

        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const verifyForm = document.getElementById('verifyForm');
        const title = document.getElementById('title');
        const errorMsg = document.getElementById('errorMsg');
        let pendingEmail = '';

        function togglePassword(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function toggleMode(mode) {
            errorMsg.style.display = 'none';
            if (mode === 'register') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
                verifyForm.style.display = 'none';
                title.innerText = 'New Identity';
            } else if (mode === 'login') {
                registerForm.style.display = 'none';
                verifyForm.style.display = 'none';
                loginForm.style.display = 'block';
                title.innerText = 'System Access';
            } else if (mode === 'verify') {
                loginForm.style.display = 'none';
                registerForm.style.display = 'none';
                verifyForm.style.display = 'block';
                title.innerText = 'Verify Identity';
            }
        }

        function setLoading(btn, isLoading) {
            if (isLoading) {
                btn.dataset.original = btn.innerText;
                btn.innerText = 'Processing...';
                btn.disabled = true;
                btn.style.opacity = '0.7';
            } else {
                btn.innerText = btn.dataset.original;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        // Login Logic
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = loginForm.querySelector('button');
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            setLoading(btn, true);
            showError("", false);

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });

                let data;
                try { data = await res.json(); } catch (err) { throw new Error("Server returned invalid response"); }

                if (data.success) {
                    window.location.href = data.redirect;
                } else {
                    showError(data.error || 'Invalid credentials');
                }
            } catch (e) {
                console.error(e);
                showError('Connection Error: ' + e.message);
            } finally {
                setLoading(btn, false);
            }
        });

        // Register Logic
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = registerForm.querySelector('button');
            const u = document.getElementById('reg-username').value;
            const em = document.getElementById('reg-email').value;
            const p = document.getElementById('reg-password').value;

            setLoading(btn, true);
            showError("", false);

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, email: em, password: p })
                });

                let data;
                try { data = await res.json(); } catch (err) { throw new Error("Server returned invalid response"); }

                if (data.success) {
                    pendingEmail = em;
                    toggleMode('verify');
                    setTimeout(() => alert(`[DEMO] Your Verification Code is: ${data.simulation_code}`), 500);
                } else {
                    showError(data.error);
                }
            } catch (e) {
                console.error(e);
                showError('Registration failed: ' + e.message);
            }
            finally { setLoading(btn, false); }
        });

        // Verify Logic
        verifyForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = verifyForm.querySelector('button');
            const code = document.getElementById('verify-code').value;

            setLoading(btn, true);
            showError("", false);

            try {
                const res = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code: code })
                });

                let data;
                try { data = await res.json(); } catch (err) { throw new Error("Server returned invalid response"); }

                if (data.success) {
                    alert('Account Created! Please Login.');
                    toggleMode('login');
                } else {
                    showError(data.error);
                }
            } catch (e) {
                console.error(e);
                showError('Verification failed: ' + e.message);
            }
            finally { setLoading(btn, false); }
        });

        function showError(msg, show = true) {
            errorMsg.innerText = msg;
            errorMsg.style.display = show ? 'block' : 'none';
        }
    </script>
</body>

</html>
